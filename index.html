<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KleinerPfadfinder &ndash; Berufsorientierung</title>
<style>
  :root {
    --papier: #f7f3ea;
    --text: #2a2620;
    --text-weich: #5a5046;
    --kompass-rot: #b03a2e;
    --kompass-rot-dunkel: #8a2d24;
    --tinten-blau: #2d4a6b;
    --moos-gruen: #4a6b3a;
    --sand: #d4c4a0;
    --sand-hell: #ebe1c8;
    --linie: #c9bea4;
    --schatten: 0 1px 3px rgba(42, 38, 32, 0.08), 0 3px 8px rgba(42, 38, 32, 0.06);
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--papier);
    color: var(--text);
    line-height: 1.55;
    font-size: 17px;
    min-height: 100vh;
  }

  main { padding: 1.5rem 1rem 4rem; }

  .container { max-width: 720px; margin: 0 auto; }
  .container-breit { max-width: 1000px; margin: 0 auto; }

  h1, h2, h3 {
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.25;
    margin: 0 0 0.6em;
  }
  h1 { font-size: 2.1rem; color: var(--kompass-rot-dunkel); }
  h2 { font-size: 1.5rem; }
  h3 { font-size: 1.15rem; }

  p { margin: 0 0 1em; }

  button, .btn {
    font: inherit;
    cursor: pointer;
    border: none;
    padding: 0.75em 1.4em;
    border-radius: 6px;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.05s;
  }
  button:active, .btn:active { transform: translateY(1px); }

  .btn-primary {
    background: var(--kompass-rot);
    color: white;
  }
  .btn-primary:hover { background: var(--kompass-rot-dunkel); }
  .btn-primary:disabled {
    background: #c9bea4;
    cursor: not-allowed;
  }

  .btn-sekundaer {
    background: transparent;
    color: var(--tinten-blau);
    border: 1.5px solid var(--tinten-blau);
  }
  .btn-sekundaer:hover { background: var(--tinten-blau); color: white; }

  .btn-leise {
    background: transparent;
    color: var(--text-weich);
    padding: 0.5em 0.9em;
    font-weight: 500;
  }
  .btn-leise:hover { color: var(--kompass-rot); }

  .karte {
    background: white;
    border: 1px solid var(--linie);
    border-radius: 8px;
    padding: 1.5rem;
    box-shadow: var(--schatten);
    margin-bottom: 1rem;
  }

  /* Startseite */
  .startseite {
    text-align: center;
    padding: 2rem 1rem;
  }
  .startseite .untertitel {
    font-size: 1.15rem;
    color: var(--text-weich);
    max-width: 560px;
    margin: 0 auto 2rem;
  }
  .startseite ul.leitplanken {
    list-style: none;
    padding: 0;
    max-width: 480px;
    margin: 2rem auto;
    text-align: left;
    font-size: 0.98rem;
  }
  .startseite ul.leitplanken li {
    padding: 0.4em 0 0.4em 1.8em;
    position: relative;
    color: var(--text-weich);
  }
  .startseite ul.leitplanken li::before {
    content: "•";
    color: var(--moos-gruen);
    font-weight: bold;
    font-size: 1.4em;
    position: absolute;
    left: 0.4em;
    top: -0.1em;
  }

  /* Fragebogen */
  .fortschritt {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    color: var(--text-weich);
    font-size: 0.92rem;
  }
  .fortschritt-balken {
    flex: 1;
    height: 4px;
    background: var(--sand-hell);
    border-radius: 2px;
    margin: 0 1rem;
    overflow: hidden;
  }
  .fortschritt-balken-fuell {
    height: 100%;
    background: var(--kompass-rot);
    transition: width 0.3s;
  }

  .frage-titel { margin-bottom: 1.5rem; }

  /* Radio-Optionen */
  .optionen { display: flex; flex-direction: column; gap: 0.5rem; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.85rem 1rem;
    border: 1.5px solid var(--linie);
    border-radius: 6px;
    cursor: pointer;
    background: white;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover { border-color: var(--tinten-blau); }
  .option input {
    margin-top: 0.2em;
    accent-color: var(--kompass-rot);
    flex-shrink: 0;
  }
  .option.gewaehlt {
    border-color: var(--kompass-rot);
    background: rgba(176, 58, 46, 0.04);
  }
  .option-text { flex: 1; }

  /* Schieberegler */
  .regler-block {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .regler-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.92rem;
    color: var(--text-weich);
  }
  .regler-label .pol { font-weight: 500; }
  input[type="range"] {
    width: 100%;
    accent-color: var(--tinten-blau);
    height: 32px;
  }
  .regler-ausgabe {
    font-size: 0.88rem;
    color: var(--moos-gruen);
    min-height: 1.2em;
    text-align: center;
    font-style: italic;
  }

  /* Tätigkeits-Karten (Block C) */
  .hilfe-text {
    color: var(--text-weich);
    font-size: 0.95rem;
    margin-bottom: 1rem;
  }
  .taetigkeiten {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.5rem;
  }
  @media (min-width: 560px) {
    .taetigkeiten { grid-template-columns: 1fr 1fr; }
  }
  .taetigkeit {
    padding: 0.75rem 0.9rem;
    border: 1.5px solid var(--linie);
    border-radius: 6px;
    background: white;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    font-size: 0.97rem;
  }
  .taetigkeit:hover { border-color: var(--tinten-blau); }
  .taetigkeit.gewaehlt {
    border-color: var(--moos-gruen);
    background: rgba(74, 107, 58, 0.08);
  }
  .taetigkeit input {
    margin-top: 0.15em;
    accent-color: var(--moos-gruen);
    flex-shrink: 0;
  }

  /* Motivations-Block */
  .motivations-hinweis {
    font-size: 0.92rem;
    color: var(--text-weich);
    margin-bottom: 0.75rem;
  }

  /* Navigation unten */
  .nav-unten {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  /* Ergebnis */
  .ergebnis-kopf {
    text-align: center;
    margin-bottom: 2rem;
  }
  .ergebnis-gitter {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  @media (min-width: 680px) {
    .ergebnis-gitter { grid-template-columns: 1fr 1fr; }
  }

  .ergebnis-karte {
    background: white;
    border: 1px solid var(--linie);
    border-radius: 8px;
    padding: 1.25rem;
    box-shadow: var(--schatten);
    display: flex;
    flex-direction: column;
  }
  .ergebnis-karte .rang {
    font-size: 0.82rem;
    color: var(--kompass-rot);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .ergebnis-karte.top {
    border: 2px solid var(--moos-gruen);
    box-shadow: 0 4px 14px rgba(74, 107, 58, 0.18);
  }
  .ergebnis-karte.top .rang {
    color: var(--moos-gruen);
  }
  .match-zeile {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin: 0.2rem 0 0.7rem;
    font-size: 0.82rem;
    color: var(--text-weich);
  }
  .match-balken {
    flex: 1;
    height: 6px;
    background: var(--linie);
    border-radius: 3px;
    overflow: hidden;
  }
  .match-fuellung {
    height: 100%;
    background: var(--moos-gruen);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .match-fuellung.mittel { background: #C9A227; }
  .match-fuellung.schwach { background: #B5651D; }
  .match-prozent {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--text);
    min-width: 2.5em;
    text-align: right;
  }
  .ergebnis-karte h3 {
    color: var(--tinten-blau);
    margin-bottom: 0.5rem;
  }
  .ergebnis-karte .beschreibung {
    color: var(--text-weich);
    font-size: 0.93rem;
    margin-bottom: 0.85rem;
  }
  .ergebnis-karte .begruendung {
    background: rgba(74, 107, 58, 0.08);
    border-left: 3px solid var(--moos-gruen);
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.85rem;
    font-size: 0.92rem;
    border-radius: 0 4px 4px 0;
  }
  .ergebnis-karte .meta {
    font-size: 0.85rem;
    color: var(--text-weich);
    margin-bottom: 0.85rem;
  }
  .ergebnis-karte .link-mehr {
    margin-top: auto;
    color: var(--tinten-blau);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
  }
  .ergebnis-karte .link-mehr:hover { text-decoration: underline; }

  .ergebnis-aktionen {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .badge-selten {
    display: inline-block;
    background: #FFF4D6;
    color: #8A6400;
    border: 1px solid #E5C88A;
    border-radius: 4px;
    padding: 0.15rem 0.5rem;
    font-size: 0.78rem;
    font-weight: 600;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  .grosser-hinweis {
    margin-top: 2rem;
    padding: 1rem 1.25rem;
    background: var(--sand-hell);
    border-left: 4px solid var(--primaer);
    border-radius: 4px;
    font-size: 0.95rem;
  }

  /* Fehler / leere Daten */
  .fehler {
    background: rgba(176, 58, 46, 0.08);
    border: 1px solid var(--kompass-rot);
    color: var(--kompass-rot-dunkel);
    padding: 1rem;
    border-radius: 6px;
    margin: 1rem 0;
  }

  /* Druck */
  @media print {
    body { background: white; font-size: 11pt; }
    .nav-unten, .ergebnis-aktionen, .btn-leise { display: none !important; }
    .karte, .ergebnis-karte { box-shadow: none; page-break-inside: avoid; }
    .ergebnis-gitter { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    h1 { font-size: 1.6rem; }
    .ergebnis-karte h3 { font-size: 1.1rem; }
  }

  /* Fokus-Stile fuer Tastatur-Navigation */
  button:focus-visible,
  .option:focus-visible,
  .taetigkeit:focus-visible,
  a:focus-visible,
  input:focus-visible {
    outline: 3px solid var(--tinten-blau);
    outline-offset: 2px;
  }

  /* Hidden utility */
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>

":"hauptschule"},{"id":"feinwerkmechaniker","name":"Feinwerkmechaniker/in","beschreibung":"Stellt präzise Metallteile für Maschinen, Werkzeuge oder Instrumente her. Arbeitet auf Hundertstelmillimeter genau, oft an CNC-gesteuerten Maschinen. Qualitätskontrolle mit Messmitteln.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"werkzeugmechaniker","name":"Werkzeugmechaniker/in","beschreibung":"Baut Spezialwerkzeuge und Formen für die Serienproduktion — z.B. Spritzgussformen für Kunststoffteile oder Stanzwerkzeuge. Höchste Präzisionsarbeit in Einzelanfertigung.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"zerspanungsmechaniker","name":"Zerspanungsmechaniker/in","beschreibung":"Fertigt Metallteile durch Drehen, Fräsen und Bohren an CNC-Maschinen. Programmiert Maschinen, spannt Werkstücke, prüft Maße. Einzelteile und Kleinserien für Maschinenbau.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"verfahrensmechaniker_metalltechnik","name":"Verfahrensmechaniker/in Hütten- und Halbzeugindustrie","beschreibung":"Überwacht Anlagen, die Metalle schmelzen, gießen und zu Blechen oder Profilen walzen. Arbeit in Stahl- und Metallwerken, oft im Schichtbetrieb bei hohen Temperaturen.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"oberflaechenbeschichter","name":"Oberflächenbeschichter/in","beschreibung":"Veredelt Metallteile durch Galvanisieren, Verzinken oder Lackieren. Schützt vor Korrosion und gibt dekorative Oberflächen. Arbeit mit Chemikalien in industriellen Anlagen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fahrzeuglackierer","name":"Fahrzeuglackierer/in","beschreibung":"Lackiert Autos und Nutzfahrzeuge nach Unfällen neu oder gestaltet individuelle Designs. Schleift, grundiert, mischt Farbtöne und spritzt in der Lackierkabine.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"maler_lackierer","name":"Maler/in und Lackierer/in","beschreibung":"Streicht Wände, tapeziert, lackiert Fenster und Türen. Gestaltet Innenräume und Fassaden mit Farben und Techniken. Arbeit bei Kunden vor Ort oder auf Baustellen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"stuckateur","name":"Stuckateur/in","beschreibung":"Bringt Putz an Wände und Decken auf, fertigt Stuckverzierungen und baut Trockenbauwände. Restauriert historische Zierelemente oder gestaltet moderne Akustikdecken.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"mechatroniker","name":"Mechatroniker/in","beschreibung":"Baut und wartet Anlagen, die Mechanik, Elektronik und Software verbinden — z.B. Produktionsroboter oder Lagersysteme. Liest Schaltpläne, programmiert Steuerungen, repariert Störungen.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kfz_mechatroniker","name":"Kfz-Mechatroniker/in","beschreibung":"Repariert und wartet Autos, Motorräder oder Nutzfahrzeuge. Diagnostiziert Fehler mit Computer, tauscht Bauteile, prüft Elektronik und Motor. Werkstatt- und Kundengespräch.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"zweiradmechatroniker","name":"Zweiradmechatroniker/in","beschreibung":"Repariert Fahrräder, E-Bikes oder Motorräder. Stellt Gänge ein, tauscht Bremsen, diagnostiziert Elektronik bei Motor-Modellen. Berät Kund:innen im Laden oder Werkstatt.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"land_baumaschinenmechatroniker","name":"Land- und Baumaschinenmechatroniker/in","beschreibung":"Wartet Traktoren, Mähdrescher, Bagger und andere Großmaschinen. Arbeitet in Werkstätten oder mobil auf Feldern und Baustellen. Kombiniert Mechanik, Hydraulik und Elektronik.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"karosserie_fahrzeugbaumechaniker","name":"Karosserie- und Fahrzeugbaumechaniker/in","beschreibung":"Repariert Karosserieschäden nach Unfällen, baut Sonderfahrzeuge oder Anhänger. Richtet Rahmen, schweißt und ersetzt Blechteile. Spezialwerkstätten und Unfallinstandsetzung.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fluggeraetmechaniker","name":"Fluggerätmechaniker/in","beschreibung":"Wartet und repariert Flugzeuge und Hubschrauber. Prüft Triebwerke, Fahrwerke und Steuersysteme nach strengen Luftfahrtvorschriften. Arbeit in Hangars, oft bei Airlines oder Herstellern.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"elektroniker_betriebstechnik","name":"Elektroniker/in für Betriebstechnik","beschreibung":"Installiert, wartet und repariert elektrische Anlagen in Fabriken und Gewerbegebäuden. Verdrahtet Schaltschränke, programmiert Steuerungen, misst Ströme und findet Fehler.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"elektroniker_energie_gebaeudetechnik","name":"Elektroniker/in für Energie- und Gebäudetechnik","beschreibung":"Installiert Stromleitungen, Steckdosen, Beleuchtung und Sicherheitssysteme in Wohn- und Geschäftsgebäuden. Arbeitet beim Kunden auf Baustellen oder in Bestandsgebäuden.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"elektroniker_automatisierungstechnik","name":"Elektroniker/in für Automatisierungstechnik","beschreibung":"Programmiert und wartet automatisierte Produktionsanlagen und Robotersysteme. Arbeitet mit Steuerungstechnik (SPS), Sensoren und Antrieben in der Industrie.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"elektroniker_geraete_systeme","name":"Elektroniker/in für Geräte und Systeme","beschreibung":"Fertigt elektronische Baugruppen für Medizin-, Mess- oder Kommunikationsgeräte. Lötet Platinen, prüft Funktionen, dokumentiert Prüfergebnisse. Serienproduktion und Prototypenbau.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"elektroniker_informations_systemtechnik","name":"Elektroniker/in für Informations- und Systemtechnik","beschreibung":"Entwickelt und repariert IT-Systeme mit Hardware und Software — Netzwerke, Server, spezielle Geräte. Schnittstelle zwischen Elektronik und IT.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"elektroniker_maschinen_antriebstechnik","name":"Elektroniker/in für Maschinen und Antriebstechnik","beschreibung":"Baut und wartet Elektromotoren, Generatoren und Transformatoren. Wickelt Spulen, prüft Leistungsdaten, repariert defekte Antriebe in Industrieanlagen.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"informationselektroniker","name":"Informationselektroniker/in","beschreibung":"Installiert und repariert Computer, Kassensysteme, Sicherheitstechnik und Kommunikationsanlagen bei Kunden. Kombiniert klassische Elektronik mit IT-Support.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"systemelektroniker","name":"Systemelektroniker/in","beschreibung":"Entwickelt und montiert elektronische Systeme für Fahrzeuge, Industrie oder Medizintechnik. Arbeitet an Prototypen und Sondergeräten, oft eng mit Ingenieur:innen zusammen.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"fachinformatiker_anwendungsentwicklung","name":"Fachinformatiker/in Anwendungsentwicklung","beschreibung":"Programmiert Software und Apps nach Kundenanforderungen. Analysiert Probleme, entwirft Lösungen, testet und dokumentiert Code. Arbeitet meist im Büro im Entwickler-Team.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"fachinformatiker_systemintegration","name":"Fachinformatiker/in Systemintegration","beschreibung":"Plant und installiert IT-Netzwerke, Server und Arbeitsplätze. Betreut Nutzer:innen bei Problemen, richtet neue Systeme ein, konfiguriert Sicherheit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"fachinformatiker_daten_prozessanalyse","name":"Fachinformatiker/in Daten- und Prozessanalyse","beschreibung":"Wertet betriebliche Daten aus, erstellt Auswertungen und hilft Prozesse zu verbessern. Arbeitet mit Datenbanken, SQL und Analyse-Tools.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"fachinformatiker_digitale_vernetzung","name":"Fachinformatiker/in Digitale Vernetzung","beschreibung":"Vernetzt Maschinen, Sensoren und IT-Systeme in Fabriken (Industrie 4.0). Richtet Datenkommunikation ein, konfiguriert Cloud-Anbindungen, sichert Netzwerke ab.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_it_systemmanagement","name":"Kaufmann/-frau für IT-System-Management","beschreibung":"Berät Unternehmen bei IT-Anschaffungen, kalkuliert Angebote, verwaltet Lizenzen und betreut Kunden. Verbindet IT-Verständnis mit kaufmännischer Arbeit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_digitalisierungsmanagement","name":"Kaufmann/-frau für Digitalisierungsmanagement","beschreibung":"Analysiert betriebliche Prozesse und schlägt digitale Lösungen vor. Begleitet Einführung neuer Software, schult Kolleg:innen, dokumentiert Abläufe.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"it_systemelektroniker","name":"IT-System-Elektroniker/in","beschreibung":"Installiert und repariert Hardware wie Netzwerke, Rechenzentren und Telekommunikationsanlagen. Verbindet Elektrotechnik mit IT.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"pflegefachmann","name":"Pflegefachmann/-frau","beschreibung":"Pflegt und betreut kranke, alte oder pflegebedürftige Menschen in Krankenhäusern, Pflegeheimen oder zu Hause. Unterstützt bei Körperpflege, verabreicht Medikamente, dokumentiert den Gesundheitszustand.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"pflegefachhelfer","name":"Pflegefachhelfer/in","beschreibung":"Unterstützt Pflegefachkräfte bei Körperpflege, Essenreichen und Mobilisation. Einstieg in den Pflegeberuf nach einjähriger Ausbildung, oft mit Weiterqualifizierung.","dauer_jahre":1,"ausbildungsart":"schulisch","schulabschluss_min":"hauptschule"},{"id":"medizinischer_fachangestellter","name":"Medizinische/r Fachangestellte/r","beschreibung":"Assistiert Ärzt:innen in Arztpraxen: empfängt Patient:innen, führt Blutentnahmen durch, verbindet Wunden, organisiert Termine und Abrechnungen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"zahnmedizinischer_fachangestellter","name":"Zahnmedizinische/r Fachangestellte/r","beschreibung":"Assistiert bei zahnärztlichen Behandlungen, bereitet Instrumente vor, erstellt Röntgenbilder, berät zu Zahnpflege und rechnet Leistungen ab.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"tiermedizinischer_fachangestellter","name":"Tiermedizinische/r Fachangestellte/r","beschreibung":"Arbeitet in Tierarztpraxen oder Tierkliniken: hält Tiere bei Untersuchungen, assistiert bei Operationen, berät Halter:innen und führt Labortests durch.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"pharmazeutisch_kaufmaennischer_angestellter","name":"Pharmazeutisch-kaufmännische/r Angestellte/r (PKA)","beschreibung":"Arbeitet in Apotheken: verwaltet Warenbestand, bestellt Medikamente, stellt Rezepturen her und unterstützt bei Kundenberatung. Kaufmännisch-pharmazeutische Mischung.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"pharmazeutisch_technischer_assistent","name":"Pharmazeutisch-technische/r Assistent/in (PTA)","beschreibung":"Stellt Arzneimittel her, berät Kund:innen in der Apotheke, prüft Wirkstoffe im Labor. Höhere Verantwortung als PKA, schulische Ausbildung mit Staatsexamen.","dauer_jahre":2.5,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"medizinisch_technischer_laboratoriumsassistent","name":"Medizinisch-technische/r Laboratoriumsassistent/in (MTA-L)","beschreibung":"Analysiert Blut-, Urin- und Gewebeproben im medizinischen Labor. Arbeitet mit Mikroskop und Analysegeräten, unterstützt ärztliche Diagnostik.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"medizinisch_technischer_radiologieassistent","name":"Medizinisch-technische/r Radiologieassistent/in (MTA-R)","beschreibung":"Bedient Röntgen-, CT- und MRT-Geräte, erstellt Bildaufnahmen für die Diagnostik. Betreut Patient:innen vor und während der Untersuchung.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"medizinisch_technischer_funktionsdiagnostiker","name":"Medizinisch-technische/r Assistent/in Funktionsdiagnostik","beschreibung":"Führt EKG, EEG, Lungen- und Hörtests durch. Misst Körperfunktionen und dokumentiert Ergebnisse für Ärzt:innen. Patientennahe Arbeit in Kliniken.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"anaesthesietechnischer_assistent","name":"Anästhesietechnische/r Assistent/in (ATA)","beschreibung":"Bereitet Narkosen vor, überwacht Patient:innen während Operationen mit dem Anästhesie-Team. Bedient Beatmungs- und Überwachungsgeräte im OP.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"operationstechnischer_assistent","name":"Operationstechnische/r Assistent/in (OTA)","beschreibung":"Assistiert Chirurg:innen im Operationssaal: reicht Instrumente, bereitet OP-Tische vor, sorgt für Sterilität. Schichtarbeit in Kliniken.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"notfallsanitaeter","name":"Notfallsanitäter/in","beschreibung":"Versorgt Verletzte und akut Kranke im Rettungsdienst. Stabilisiert Patient:innen am Einsatzort, transportiert sie in Kliniken. Hohe Belastung, Schichtdienst.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"rettungssanitaeter","name":"Rettungssanitäter/in","beschreibung":"Transportiert Kranke und Verletzte im Krankenwagen, unterstützt Notfallsanitäter:innen. Kurzausbildung als Einstieg in den Rettungsdienst, oft ehrenamtlich.","dauer_jahre":1,"ausbildungsart":"schulisch","schulabschluss_min":"hauptschule"},{"id":"physiotherapeut","name":"Physiotherapeut/in","beschreibung":"Behandelt Menschen mit Bewegungseinschränkungen durch gezielte Übungen und manuelle Techniken. Erstellt Therapiepläne nach ärztlicher Verordnung, arbeitet in Praxen oder Kliniken.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"ergotherapeut","name":"Ergotherapeut/in","beschreibung":"Hilft Menschen, Alltagsfähigkeiten nach Krankheit oder Unfall wiederzugewinnen. Übt Greifen, Anziehen oder Konzentration mit Kindern, Senior:innen oder Patient:innen nach Schlaganfall.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"logopaede","name":"Logopäd/in","beschreibung":"Therapiert Sprach-, Sprech- und Schluckstörungen bei Kindern und Erwachsenen. Arbeitet in Praxen, Kliniken oder Förderschulen, oft nach Schlaganfall oder bei Entwicklungsstörungen.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"masseur_medizinischer_bademeister","name":"Masseur/in und medizinische/r Bademeister/in","beschreibung":"Führt Massagen und physikalische Therapien auf ärztliche Anordnung durch. Arbeitet in Kliniken, Reha-Zentren oder Praxen, oft als Einstieg in die Physiotherapie.","dauer_jahre":2.5,"ausbildungsart":"schulisch","schulabschluss_min":"hauptschule"},{"id":"podologe","name":"Podolog/in (medizinische/r Fußpfleger/in)","beschreibung":"Behandelt Fußerkrankungen wie eingewachsene Nägel oder Hornhautprobleme, besonders bei Diabetiker:innen. Medizinischer Beruf, abzugrenzen von kosmetischer Fußpflege.","dauer_jahre":2,"ausbildungsart":"schulisch","schulabschluss_min":"hauptschule"},{"id":"diaetassistent","name":"Diätassistent/in","beschreibung":"Erstellt Ernährungspläne für Kranke, berät bei Übergewicht oder Unverträglichkeiten und plant Diätküchen in Kliniken. Mischung aus Medizin und Ernährungswissenschaft.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"orthoptist","name":"Orthoptist/in","beschreibung":"Untersucht und behandelt Sehstörungen, Schielerkrankungen und Augenmuskelschwächen — besonders bei Kindern. Arbeitet in Augenkliniken und Sehschulen.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"biologielaborant","name":"Biologielaborant/in","beschreibung":"Untersucht Proben aus Medizin, Umwelt oder Lebensmitteln im Labor. Züchtet Zellkulturen, bedient Mikroskope und Analysegeräte, dokumentiert Messergebnisse.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"chemielaborant","name":"Chemielaborant/in","beschreibung":"Analysiert Substanzen und entwickelt neue Produkte in der chemischen Industrie oder Forschung. Führt Reaktionen durch, misst mit Spektrometern und dokumentiert präzise.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"physiklaborant","name":"Physiklaborant/in","beschreibung":"Unterstützt physikalische Forschung und Qualitätsprüfung mit Messungen, Experimenten und Geräteaufbau. Arbeitet in Industrie, Forschungsinstituten oder an Universitäten.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"lacklaborant","name":"Lacklaborant/in","beschreibung":"Entwickelt und prüft Lacke, Farben und Beschichtungen. Mischt Rezepturen, testet Wetterbeständigkeit und Haftung, dokumentiert für die Produktion.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"textillaborant","name":"Textillaborant/in","beschreibung":"Untersucht Fasern, Gewebe und Textilveredelung im Labor. Prüft Reißfestigkeit, Farbechtheit und Schadstofffreiheit für Kleidung und Heimtextilien.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"chemikant","name":"Chemikant/in","beschreibung":"Bedient Anlagen zur Herstellung chemischer Produkte — Kunststoffe, Medikamente, Reinigungsmittel. Überwacht Temperatur, Druck und Mengen in Produktionsreaktoren.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"pharmakant","name":"Pharmakant/in","beschreibung":"Stellt Arzneimittel in der Pharmaindustrie her: Tabletten, Salben, Injektionen. Überwacht sterile Produktionsanlagen und dokumentiert nach Arzneibuch.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"produktionsfachkraft_chemie","name":"Produktionsfachkraft Chemie","beschreibung":"Unterstützt bei Produktion und Verpackung chemischer Produkte. Zweijährige Ausbildung als Einstieg, oft mit Aufstieg zur Chemikant:in möglich.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"umweltschutztechnischer_assistent","name":"Umweltschutztechnische/r Assistent/in","beschreibung":"Nimmt Wasser-, Boden- und Luftproben, analysiert sie im Labor. Überwacht Schadstoffgrenzwerte für Behörden oder Industrie.","dauer_jahre":2,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"biologisch_technischer_assistent","name":"Biologisch-technische/r Assistent/in (BTA)","beschreibung":"Arbeitet in biologischen Laboren: kultiviert Zellen, mikroskopiert Proben, unterstützt Forschungsprojekte in Medizin, Biotechnologie oder Ökologie.","dauer_jahre":2,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"chemisch_technischer_assistent","name":"Chemisch-technische/r Assistent/in (CTA)","beschreibung":"Schulische Variante zum Chemielaborant: analysiert Substanzen, bereitet Experimente vor, arbeitet in Industrie- oder Forschungslaboren.","dauer_jahre":2,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"maurer","name":"Maurer/in","beschreibung":"Errichtet Wände aus Ziegeln, Kalksandstein oder Beton. Mischt Mörtel, verlegt Fundamente, baut Schornsteine. Körperliche Arbeit überwiegend im Freien.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"beton_stahlbetonbauer","name":"Beton- und Stahlbetonbauer/in","beschreibung":"Errichtet Brücken, Hochhäuser, Tunnel und Industriebauten aus Beton. Baut Schalungen, verlegt Bewehrungsstahl, betoniert große Bauteile.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"dachdecker","name":"Dachdecker/in","beschreibung":"Deckt Dächer mit Ziegeln, Schiefer oder Metall. Montiert Dachrinnen, baut Solaranlagen, dämmt Dachstühle. Arbeit in der Höhe bei jedem Wetter.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fliesenleger","name":"Fliesen-, Platten- und Mosaikleger/in","beschreibung":"Verlegt Fliesen in Bädern, Küchen und öffentlichen Räumen. Bereitet Untergründe vor, schneidet passgenau, verfugt. Mix aus handwerklicher und gestalterischer Arbeit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"estrichleger","name":"Estrichleger/in","beschreibung":"Verlegt Bodenflächen aus Estrich, die als Grundlage für Fliesen, Parkett oder Teppich dienen. Mischt, pumpt und glättet große Flächen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"strassenbauer","name":"Straßenbauer/in","beschreibung":"Baut Straßen, Wege und Plätze: pflastert, asphaltiert, setzt Randsteine. Bedient Baumaschinen wie Walzen und Asphaltfertiger. Arbeit bei Wind und Wetter.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"tiefbaufacharbeiter","name":"Tiefbaufacharbeiter/in","beschreibung":"Baut Kanäle, Leitungen und Fundamente unter der Erde. Gräbt Baugruben, verlegt Rohre für Abwasser und Gas, sichert Böschungen.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"kanalbauer","name":"Kanalbauer/in","beschreibung":"Baut und saniert Abwasserkanäle und Kläranlagen. Verlegt Rohre in tiefen Gräben, prüft Dichtheit, oft in sehr engen Baugruben.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"rohrleitungsbauer","name":"Rohrleitungsbauer/in","beschreibung":"Verlegt große Rohre für Fernwärme, Gas, Wasser oder Industrie über lange Strecken. Schweißt und montiert auf Baustellen, oft in Gräben.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"brunnenbauer","name":"Brunnenbauer/in","beschreibung":"Bohrt Brunnen für Trink- und Nutzwasser, baut Erdwärmesonden für Heizungen. Bedient schwere Bohrgeräte, analysiert Bodenschichten.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gleisbauer","name":"Gleisbauer/in","beschreibung":"Baut und wartet Bahngleise, Weichen und Bahnsteige. Arbeitet oft nachts, wenn keine Züge fahren. Körperlich anspruchsvoll, viel Technik.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"spezialtiefbauer","name":"Spezialtiefbauer/in","beschreibung":"Sichert Baugruben mit Spundwänden, bohrt Pfähle für Fundamente, arbeitet an Brücken- und Tunnelgründungen. Schwere Maschinen, anspruchsvolle Technik.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"trockenbaumonteur","name":"Trockenbaumonteur/in","beschreibung":"Baut Innenwände, Decken und Raum-in-Raum-Lösungen aus Gipsplatten. Dämmt, beplankt und montiert Profile. Arbeitet überwiegend in Gebäuden.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"geruestbauer","name":"Gerüstbauer/in","beschreibung":"Errichtet und demontiert Gerüste an Gebäuden, Brücken oder Industrieanlagen. Körperlich fordernd, Arbeit in der Höhe nach strengen Sicherheitsregeln.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"hochbaufacharbeiter","name":"Hochbaufacharbeiter/in","beschreibung":"Zweijährige Grundausbildung im Hochbau, oft als Einstieg in Maurer- oder Betonbau-Beruf. Unterstützt bei Rohbauarbeiten auf Baustellen.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"ausbaufacharbeiter","name":"Ausbaufacharbeiter/in","beschreibung":"Zweijährige Grundausbildung im Ausbau (Innenausbau) — Grundlage für Trockenbau, Fliesenleger oder Stuckateur. Kombiniert mehrere Gewerke.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"tiefbaufacharbeiter_grund","name":"Tiefbaufacharbeiter/in (Grundausbildung)","beschreibung":"Zweijährige Grundausbildung für alle Tiefbauberufe — Straßen, Kanal, Gleis. Einstieg mit Option zur Spezialisierung.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"bauzeichner","name":"Bauzeichner/in","beschreibung":"Erstellt technische Zeichnungen und Pläne für Gebäude, Straßen oder Brücken am Computer. Arbeitet mit CAD-Software in Architekturbüros oder Baufirmen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"vermessungstechniker","name":"Vermessungstechniker/in","beschreibung":"Misst Grundstücke, Gebäude und Baustellen mit Laser und GPS. Erstellt Karten und Pläne, arbeitet draußen im Gelände und am Computer.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"geomatiker","name":"Geomatiker/in","beschreibung":"Erstellt und pflegt digitale Karten und Geodaten für Städte, Verkehr oder Umwelt. Arbeitet mit Geoinformationssystemen (GIS), Satellitendaten und Luftbildern.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"ofen_luftheizungsbauer","name":"Ofen- und Luftheizungsbauer/in","beschreibung":"Baut Kachelöfen, Kamine und Lüftungsanlagen auf Maß. Plant Wärmeverteilung, verkleidet mit Kacheln oder Stein. Handwerkliche Einzelanfertigung.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"schornsteinfeger","name":"Schornsteinfeger/in","beschreibung":"Kontrolliert und reinigt Schornsteine, Heizungen und Abgasanlagen. Misst Emissionen, berät zu Brandsicherheit und Umweltschutz. Selbständige Arbeit im Kehrbezirk.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gaertner_garten_landschaftsbau","name":"Gärtner/in Garten- und Landschaftsbau","beschreibung":"Legt Gärten, Parks und öffentliche Grünanlagen an. Pflanzt Bäume und Stauden, pflastert Wege, baut Teiche und Mauern. Arbeit überwiegend draußen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gaertner_zierpflanzenbau","name":"Gärtner/in Zierpflanzenbau","beschreibung":"Zieht Blumen, Topfpflanzen und Dekopflanzen in Gärtnereien. Sät, pikiert, düngt und pflegt Kulturen in Gewächshäusern für den Verkauf.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gaertner_obstbau","name":"Gärtner/in Obstbau","beschreibung":"Zieht Äpfel, Beeren und Stein­obst in Plantagen. Schneidet Bäume, erntet, veredelt neue Sorten. Saisonale Arbeit mit viel Draußensein.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gaertner_gemuesebau","name":"Gärtner/in Gemüsebau","beschreibung":"Baut Gemüse im Freiland und in Gewächshäusern an. Sät, pflegt, erntet und bereitet für den Verkauf vor. Produziert für Markt, Handel oder Direktverkauf.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gaertner_baumschule","name":"Gärtner/in Baumschule","beschreibung":"Zieht Bäume, Sträucher und Stauden für Gärten und Landschaftsbau. Veredelt, verpflanzt und berät Kund:innen. Langfristige Pflanzkulturen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gaertner_staudengaertnerei","name":"Gärtner/in Staudengärtnerei","beschreibung":"Spezialisiert auf mehrjährige Blütenpflanzen. Vermehrt, kultiviert und berät zu Stauden für Garten und Landschaft.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"gaertner_friedhofsgaertnerei","name":"Gärtner/in Friedhofsgärtnerei","beschreibung":"Pflegt und gestaltet Gräber und Friedhofsanlagen. Bepflanzt, pflegt, beräumt. Kombiniert Gartenbau mit sensiblem Kundenkontakt.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"landwirt","name":"Landwirt/in","beschreibung":"Führt einen landwirtschaftlichen Betrieb: baut Getreide, Gemüse oder Futterpflanzen an, hält Rinder, Schweine oder Geflügel. Arbeitet mit Traktoren und großen Maschinen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"winzer","name":"Winzer/in","beschreibung":"Baut Wein an, erntet Trauben und keltert Wein. Pflegt Weinberge, überwacht Gärung, füllt ab und vermarktet. Handwerk mit Saisonrhythmus.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"forstwirt","name":"Forstwirt/in","beschreibung":"Bewirtschaftet Wälder: pflanzt Bäume, pflegt Jungbestände, fällt Bäume mit Motorsäge. Arbeit im Wald bei jedem Wetter, oft allein oder in kleinen Teams.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"revierjaeger","name":"Revierjäger/in","beschreibung":"Betreut Jagdreviere, hegt Wild, erlegt Tiere nach Plan, bildet Jagdhunde aus. Seltener Beruf in Forstverwaltungen oder privaten Revieren.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fischwirt","name":"Fischwirt/in","beschreibung":"Züchtet Fische in Teichen oder im Meer oder fängt Fisch. Arbeitet in Aquakulturen, Fischereien oder in der Hochsee-Fischerei. Drei Fachrichtungen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"tierwirt","name":"Tierwirt/in","beschreibung":"Spezialisiert auf Rinder, Schafe, Schweine, Geflügel oder Imkerei. Versorgt Tiere, überwacht Gesundheit, vermarktet Produkte wie Milch oder Eier.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"pferdewirt","name":"Pferdewirt/in","beschreibung":"Versorgt, züchtet und bildet Pferde aus. Arbeitet auf Reiterhöfen, Gestüten oder Rennställen. Fünf Fachrichtungen von Haltung bis Rennreiten.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"tierpfleger","name":"Tierpfleger/in","beschreibung":"Versorgt Tiere in Zoos, Tierheimen oder Forschungseinrichtungen: füttert, reinigt Gehege, beobachtet Gesundheit, assistiert bei tierärztlichen Behandlungen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"molkereifachmann","name":"Milchtechnologe/Milchtechnologin","beschreibung":"Stellt Milchprodukte wie Joghurt, Käse und Butter industriell her. Überwacht Produktion, prüft Qualität, bedient Abfüllanlagen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"milchwirtschaftlicher_laborant","name":"Milchwirtschaftliche/r Laborant/in","beschreibung":"Prüft Milch und Milchprodukte auf Qualität, Inhaltsstoffe und Keimbelastung. Laborarbeit in Molkereien für Lebensmittelsicherheit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"fachkraft_agrarservice","name":"Fachkraft Agrarservice","beschreibung":"Arbeitet für Dienstleister, die Landwirten Maschinen und Fahrer für Ernte oder Aussaat stellen. Fährt Mähdrescher oder Feldhäcksler.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"koch","name":"Koch/Köchin","beschreibung":"Bereitet Speisen in Restaurants, Kantinen oder Hotels zu. Stellt Speisepläne auf, koordiniert Küchenabläufe. Schnelles Arbeiten unter Zeitdruck, oft abends und am Wochenende.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachkraft_gastronomie","name":"Fachkraft für Gastronomie","beschreibung":"Arbeitet in Service oder Küche gastronomischer Betriebe. Zweijährige Ausbildung als Einstieg — danach Weiterqualifikation zu Koch oder Restaurantfachmann möglich.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"restaurantfachmann","name":"Fachmann/-frau für Restaurants und Veranstaltungsgastronomie","beschreibung":"Betreut Gäste, berät bei Speisen und Getränken, serviert und kassiert. Plant Veranstaltungen und Banketts. Arbeit mit viel Kundenkontakt.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"hotelfachmann","name":"Hotelfachmann/-frau","beschreibung":"Arbeitet in allen Bereichen eines Hotels: Rezeption, Restaurant, Housekeeping, Bankett. Berät Gäste, organisiert Abläufe, rechnet Leistungen ab.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_hotelmanagement","name":"Kaufmann/-frau für Hotelmanagement","beschreibung":"Organisiert kaufmännische Abläufe im Hotel: Marketing, Personal, Einkauf, Controlling. Weniger operativ als Hotelfachmann, mehr Büro- und Planungsarbeit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"fachmann_systemgastronomie","name":"Fachmann/-frau für Systemgastronomie","beschreibung":"Arbeitet in standardisierten Ketten wie Fastfood oder Cafés. Führt Filialen, organisiert Personal, überwacht Qualität nach festgelegten Prozessen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"baecker","name":"Bäcker/in","beschreibung":"Stellt Brot, Brötchen, Kuchen und Teigwaren her. Arbeit beginnt sehr früh am Morgen in der Backstube. Mischung aus Handwerk und Produktion.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"konditor","name":"Konditor/in","beschreibung":"Fertigt Torten, Pralinen, feine Kuchen und Desserts. Dekoriert kunstvoll, arbeitet mit Schokolade und Marzipan. Kreative Backstube, oft in Cafés.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fleischer","name":"Fleischer/in / Metzger/in","beschreibung":"Zerlegt Fleisch, stellt Wurst, Schinken und Fleischwaren her. Handwerkliche Arbeit in Metzgereien oder industriell in Lebensmittelbetrieben.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachverkaeufer_fleischerei","name":"Fachverkäufer/in im Lebensmittelhandwerk — Fleischerei","beschreibung":"Verkauft Fleisch, Wurst und Fertigspeisen in Metzgereien. Berät zu Zubereitung, schneidet auf, betreibt Mittagstisch oder Party-Service.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachverkaeufer_baeckerei","name":"Fachverkäufer/in im Lebensmittelhandwerk — Bäckerei","beschreibung":"Verkauft Brot, Backwaren und Snacks in Bäckereien. Belegt Brötchen, bereitet Kaffee zu, berät Kund:innen früh am Morgen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachkraft_lebensmitteltechnik","name":"Fachkraft für Lebensmitteltechnik","beschreibung":"Stellt Lebensmittel industriell her — von Tiefkühlkost bis Süßwaren. Bedient große Produktionsanlagen, überwacht Qualität und Hygiene.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"brauer_maelzer","name":"Brauer/in und Mälzer/in","beschreibung":"Stellt Bier her: mälzt Gerste, braut, lässt gären, füllt ab. Arbeitet in Brauereien, überwacht Qualität und Reinheit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachkraft_fruchtsaft","name":"Fachkraft für Fruchtsafttechnik","beschreibung":"Stellt Säfte und Fruchtgetränke industriell her. Presst, filtert, pasteurisiert und füllt ab. Überwacht Hygiene in der Lebensmittelproduktion.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"weintechnologe","name":"Weintechnolog/in","beschreibung":"Industrielle Variante zum Winzer: arbeitet in Kellereien, kontrolliert Gärung und Abfüllung, analysiert Weinqualität. Große Betriebe.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"destillateur","name":"Destillateur/in","beschreibung":"Stellt Spirituosen wie Schnaps, Liköre und Whisky her. Destilliert, lagert, mischt nach Rezept. Kleinere Traditionsbrennereien oder Industrie.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachkraft_sueswaren","name":"Fachkraft für Süßwarentechnik","beschreibung":"Stellt Schokolade, Bonbons, Kaugummi und Kekse industriell her. Überwacht Anlagen, prüft Qualität, verpackt für den Handel.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"kaufmann_einzelhandel","name":"Kaufmann/-frau im Einzelhandel","beschreibung":"Berät Kund:innen im Laden, kassiert, räumt Waren ein und disponiert Nachschub. Plant Sonderaktionen, gestaltet Warenpräsentation.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"verkaeufer","name":"Verkäufer/in","beschreibung":"Zweijährige Grundausbildung für den Einzelhandel: Beratung, Kasse, Warenannahme. Einstieg mit Aufstockung zum Einzelhandelskaufmann möglich.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"kaufmann_grosshandel","name":"Kaufmann/-frau im Groß- und Außenhandelsmanagement","beschreibung":"Handelt große Warenmengen zwischen Herstellern und Händlern, organisiert Import/Export. Kaufmännische Arbeit mit Logistik- und internationalem Bezug.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_ecommerce","name":"Kaufmann/-frau im E-Commerce","beschreibung":"Betreibt Online-Shops: pflegt Produkte, betreut Kunden, analysiert Verkaufsdaten, plant Online-Marketing. Mischung aus Handel und digitalem Marketing.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_bueromanagement","name":"Kaufmann/-frau für Büromanagement","beschreibung":"Organisiert Büroabläufe: Korrespondenz, Terminplanung, Rechnungen, Personalverwaltung. Breit einsetzbar in fast allen Branchen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"industriekaufmann","name":"Industriekaufmann/-frau","beschreibung":"Arbeitet in Industriebetrieben in Einkauf, Verkauf, Marketing oder Personal. Koordiniert Geschäftsprozesse, kalkuliert Preise, wertet Kennzahlen aus.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_spedition","name":"Kaufmann/-frau für Spedition und Logistikdienstleistung","beschreibung":"Organisiert Transport von Waren per LKW, Schiff, Flugzeug oder Zug. Kalkuliert Frachtkosten, koordiniert Zoll und Fahrer:innen, betreut Kunden.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"fachlagerist","name":"Fachlagerist/in","beschreibung":"Nimmt Waren an, lagert sie ein, kommissioniert Bestellungen und macht sie versandfertig. Bedient Gabelstapler, arbeitet mit Lagersoftware.","dauer_jahre":2,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachkraft_lagerlogistik","name":"Fachkraft für Lagerlogistik","beschreibung":"Plant und organisiert Lagerabläufe, überwacht Bestände, optimiert Prozesse. Erweiterte dreijährige Ausbildung nach dem Fachlageristen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"kaufmann_versicherung_finanzen","name":"Kaufmann/-frau für Versicherungen und Finanzen","beschreibung":"Berät Kund:innen zu Versicherungen und Geldanlagen, prüft Schadenfälle, kalkuliert Tarife. Büroarbeit mit viel Kundenkontakt.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"bankkaufmann","name":"Bankkaufmann/-frau","beschreibung":"Berät Kund:innen zu Konten, Krediten und Geldanlagen. Arbeitet in Bankfilialen oder Verwaltung. Kaufmännisch mit starkem Beratungsanteil.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"immobilienkaufmann","name":"Immobilienkaufmann/-frau","beschreibung":"Verwaltet Mietwohnungen, vermittelt Häuser und Grundstücke, kalkuliert Nebenkosten. Mischung aus Büro, Besichtigung und Kundenkontakt.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_tourismus_freizeit","name":"Kaufmann/-frau für Tourismus und Freizeit","beschreibung":"Plant und vermarktet Reiseangebote, berät Urlauber:innen in Reisebüros, organisiert Events in Freizeit- und Tourismusregionen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"tourismuskaufmann","name":"Tourismuskaufmann/-frau (Privat- und Geschäftsreisen)","beschreibung":"Verkauft Reisen, bucht Flüge und Hotels, betreut Geschäfts- und Privatkunden. Arbeitet in Reisebüros oder bei Veranstaltern.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"veranstaltungskaufmann","name":"Veranstaltungskaufmann/-frau","beschreibung":"Plant Konzerte, Messen, Tagungen und Firmenfeiern. Koordiniert Technik, Catering und Gäste, kalkuliert Budgets. Viel Stress und Wochenendarbeit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"sport_fitnesskaufmann","name":"Sport- und Fitnesskaufmann/-frau","beschreibung":"Managet Sportstudios und Vereine: Mitgliederwerbung, Kurse organisieren, Trainer koordinieren. Kaufmännisches Arbeiten im Sportumfeld.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_audiovisuelle_medien","name":"Kaufmann/-frau für audiovisuelle Medien","beschreibung":"Arbeitet bei TV-, Radio- oder Film-Produktionsfirmen: kalkuliert Projekte, organisiert Drehs, rechnet Lizenzen ab.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"kaufmann_marketingkommunikation","name":"Kaufmann/-frau für Marketingkommunikation","beschreibung":"Plant und setzt Werbe- und Marketingkampagnen um. A tal, berät Kund:innen, betreibt oft eigenes Studio.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"filmkopierwerker","name":"Film- und Videoeditor/in","beschreibung":"Schneidet Filme, Serien und Werbefilme am Computer. Wählt Aufnahmen, setzt Effekte, vertont. Kreative Arbeit in Postproduktion.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"gestalter_visuelles_marketing","name":"Gestalter/in für visuelles Marketing","beschreibung":"Gestaltet Schaufenster, Messestände und Ladenauslagen. Setzt Produkte wirkungsvoll in Szene, plant Licht und Dekoration.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"technischer_produktdesigner","name":"Technische/r Produktdesigner/in","beschreibung":"Entwirft technische Zeichnungen und 3D-Modelle für Maschinen, Geräte oder Anlagen am Computer. Arbeitet mit CAD-Software im Ingenieurbüro.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"technischer_systemplaner","name":"Technische/r Systemplaner/in","beschreibung":"Plant Elektro-, Versorgungs- oder Stahlbaukonstruktionen als technische Zeichnung. Dreht Fachrichtungen: Elektrotechnik, HLK, Stahlbau.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"produktgestalter_textil","name":"Produktgestalter/in Textil","beschreibung":"Entwirft Stoffe und Muster für Mode, Heim- oder Technik-Textilien. Experimentiert mit Garnen und Webtechniken, erstellt Entwürfe und Prototypen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"modist","name":"Modist/in","beschreibung":"Fertigt Hüte und Kopfbedeckungen nach Maß. Formt Filz, näht, schmückt mit Bändern oder Federn. Traditionelles Handwerk in kleinen Ateliers.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"masschneider","name":"Maßschneider/in","beschreibung":"Fertigt Kleidung nach Maß individuell für Kund:inn n oder Auto-Innenausstattung.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"kuerschner","name":"Kürschner/in","beschreibung":"Fertigt Pelzbekleidung und -accessoires. Verarbeitet Felle, entwirft, näht, repariert. Seltener Beruf in kleinen Ateliers.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"schuhmacher","name":"Schuhmacher/in","beschreibung":"Fertigt und repariert Schuhe nach Maß, oft orthopädisch. Schneidet Leder, näht, klebt, besohlt. Handwerkliche Einzelarbeit.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"orthopaedieschuhmacher","name":"Orthopädieschuhmacher/in","beschreibung":"Fertigt orthopädische Schuhe und Einlagen nach ärztlicher Verordnung. Medizinisches Handwerk in Sanitätshäusern und Werkstätten.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"orthopaedietechnikmechaniker","name":"Orthopädietechnik-Mechaniker/in","beschreibung":"Fertigt Prothesen, Bandagen und orthopädische Hilfsmittel individuell an. Arbeitet in Sanitätshäusern, kombiniert Handwerk mit Medizintechnik.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"hoergeraeteakustiker","name":"Hörakustiker/in","beschreibung":"Passt Hörgeräte an, führt Hörtests durch, berät Kund:innen. Kombiniert Technik, Medizin und Beratung in Fachgeschäften.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"augenoptiker","name":"Augenoptiker/in","beschreibung":"Misst Sehstärken, berät zu Brillen und Kontaktlinsen, fertigt Brillen an. Mischung aus Kundenberatung, Werkstatt und optischer Messung.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"zahntechniker","name":"Zahntechniker/in","beschreibung":"Fertigt Zahnersatz wie Kronen, Brücken oder Prothesen in Dentallaboren. Präzisionsarbeit mit Abdrücken und modernsten 3D-Druckern.","dauer_jahre":3.5,"ausbildungsart":"dual","schulabschluss_min":"realschule"},{"id":"erzieher","name":"Erzieher/in","beschreibung":"Betreut Kinder in Kitas, Horten oder Heimen. Plant pädagogische Angebote, fördert Entwicklung, arbeitet mit Familien zusammen.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"sozialpaedagogischer_assistent","name":"Sozialpädagogische/r Assistent/in (Kinderpfleger/in)","beschreibung":"Unterstützt Erzieher:innen in Kitas und Grundschulen bei Betreuung, Pflege und Förderung von Kindern. Zwei- bis dreijährige schulische Ausbildung.","dauer_jahre":2,"ausbildungsart":"schulisch","schulabschluss_min":"hauptschule"},{"id":"heilerziehungspfleger","name":"Heilerziehungspfleger/in","beschreibung":"Begleitet Menschen mit Behinderung im Alltag, bei Arbeit und Freizeit. Pflegerisch-pädagogische Arbeit in Wohnheimen und Werkstätten.","dauer_jahre":3,"ausbildungsart":"schulisch","schulabschluss_min":"realschule"},{"id":"altenpfleger_helfer","name":"Altenpflegehelfer/in","beschreibung":"Unterstützt ältere Menschen bei Körperpflege, Mahlzeiten und Mobilität in Heimen oder häuslicher Pflege. Einjährige Ausbildung, oft Einstieg.","dauer_jahre":1,"ausbildungsart":"schulisch","schulabschluss_min":"hauptschule"},{"id":"sozialassistent","name":"Sozialassistent/in","beschreibung":"Unterstützt pflegerische oder pädagogische Fachkräfte in Heimen, Kitas oder Familien. Grundlage für Weiterbildung zu Erzieher oder Pfleger.","dauer_jahre":2,"ausbildungsart":"schulisch","schulabschluss_min":"hauptschule"},{"id":"hauswirtschafter","name":"Hauswirtschafter/in","beschreibung":"Leitet Haushalte in Kantinen, Heimen oder Privathaushalten: kocht, reinigt, plant Einkäufe. Praktischer Beruf mit Ernährungs- und Organisationswissen.","dauer_jahre":3,"ausbildungsart":"dual","schulabschluss_min":"hauptschule"},{"id":"fachkraft_kueche","name":"Fachkraft Küche","beschreibung":"Zweijährige Ausbildung zur Küchenhilfe in Kantinen, Heimen und Gastronomie. Einstieg, meist mit Weiterbi /* ======================================================================

   ====================================================================== */

const SPEICHER_KEY = "kleinerpfadfinder_state_v1";

// Score-Gewichtungen und Schwellen (zentral, damit Drift verhindert wird).
const W_TAGS = 0.6;
const W_UMGEBUNG = 0.25;
const W_MOTIVATION = 0.15;
const SCHWELLE_RELEVANT = 0.25;       // Score, ab dem ein Beruf ohne 2+ Tag-Match noch durchkommt
const SCHWELLE_STARK = 0.60;          // Score "starke Passung" (Balken-Skala + Stufen-Badge)
// Stufen (Match-Badge + CSS-Klasse), absteigend; passende Stufe = erste, die b.score erreicht.
const PASSUNGS_STUFEN = [
  { min: SCHWELLE_STARK,    klasse: "",        text: "starke Passung" },
  { min: SCHWELLE_RELEVANT, klasse: "mittel",  text: "mittlere Passung" },
  { min: 0,                 klasse: "schwach", text: "schwache Passung" }
];

const FRAGE_SCHRITTE = [
  { typ: "regler", reglerIndex: 0 },
  { typ: "regler", reglerIndex: 1 },
  { typ: "regler", reglerIndex: 2 },
  { typ: "regler", reglerIndex: 3 },
  { typ: "taetigkeit", frageIndex: 0, titel: FRAGEN_C_TITEL[0] },
  { typ: "taetigkeit", frageIndex: 1, titel: FRAGEN_C_TITEL[1] },
  { typ: "taetigkeit", frageIndex: 2, titel: FRAGEN_C_TITEL[2] },
  { typ: "taetigkeit", frageIndex: 3, titel: FRAGEN_C_TITEL[3] },
  { typ: "taetigkeit", frageIndex: 4, titel: FRAGEN_C_TITEL[4] },
  { typ: "taetigkeit", frageIndex: 5, titel: FRAGEN_C_TITEL[5] },
  { typ: "motivation", titel: "Was wäre dir in deinem Beruf am wichtigsten?" }
];

const ANZAHL_FRAGEN = FRAGE_SCHRITTE.length;

function leererState() {
  return {
    screen: "start", // "start" | "frage" | "ergebnis"
    frageIndex: 0,
    antworten: {
      regler: { drinnen_draussen: 50, allein_team: 50, routine_wechsel: 50, anpacken_konzentriert: 50 },
      taetigkeiten: new Set(),
      motivation: new Set()
    }
  };
}

function speichereState(state) {
  try {
    const ser = {
      ...state,
      antworten: {
        ...state.antworten,
        taetigkeiten: Array.from(state.antworten.taetigkeiten),
        motivation: Array.from(state.antworten.motivation)
      }
    };
    localStorage.setItem(SPEICHER_KEY, JSON.stringify(ser));
  } catch (e) { /* localStorage ggf. gesperrt — egal */ }
}

function ladeState() {
  try {
    const raw = localStorage.getItem(SPEICHER_KEY);
    if (!raw) return leererState();
    const parsed = JSON.parse(raw);
    parsed.antworten.taetigkeiten = new Set(parsed.antworten.taetigkeiten || []);
    parsed.antworten.motivation = new Set(parsed.antworten.motivation || []);
    if (!parsed.antworten.regler) parsed.antworten.regler = leererState().antworten.regler;
    return parsed;
  } catch (e) { return leererState(); }
}

let state = ladeState();

/* ======================================================================
   RENDER-FUNKTIONEN
   ====================================================================== */

const app = document.getElementById("app");

function rendere() {
  if (state.screen === "start") rendereStart();
  else if (state.screen === "frage") rendereFrage();
  else if (state.screen === "ergebnis") rendereErgebnis();
  speichereState(state);
  window.scrollTo(0, 0);
}

function rendereStart() {
  app.className = "container";
  app.innerHTML = `
    <section class="startseite">
      <h1>KleinerPfadfinder</h1>
      <p class="untertitel">
        Ein Fragebogen für Schüler:innen, die nach einem Ausbildungsberuf suchen.
        Am Ende bekommst du <strong>10 Berufe als Spektrum</strong> — keine einzelne
        „Top-Empfehlung", sondern Ideen, über die du vielleicht noch nie nachgedacht hast.
      </p>
      <ul class="leitplanken">
        <li>Dauert etwa 5 Minuten.</li>
        <li>Deine Antworten bleiben auf deinem Gerät — es wird nichts gesendet.</li>
        <li>Du kannst jederzeit zurück oder neu starten.</li>
      </ul>
      <div style="margin-top: 2.5rem;">
        <button class="btn btn-primary" id="btn-start">Los geht's</button>
        ${hatFortschritt() ? `<div style="margin-top: 1rem;"><button class="btn btn-leise" id="btn-weiter">Fortsetzen bei Frage ${state.frageIndex + 1}</button></div>` : ""}
      </div>
    </section>
  `;
  document.getElementById("btn-start").addEventListener("click", () => {
    state = leererState();
    state.screen = "frage";
    rendere();
  });
  const btnWeiter = document.getElementById("btn-weiter");
  if (btnWeiter) btnWeiter.addEventListener("click", () => {
    state.screen = "frage";
    rendere();
  });
}

function hatFortschritt() {
  const a = state.antworten;
  return a.taetigkeiten.size > 0 || a.motivation.size > 0;
}

function rendereFortschritt() {
  const schritt = state.frageIndex + 1;
  const prozent = Math.round((schritt / ANZAHL_FRAGEN) * 100);
  return `
    <div class="fortschritt">
      <span>Frage ${schritt} von ${ANZAHL_FRAGEN}</span>
      <div class="fortschritt-balken"><div class="fortschritt-balken-fuell" style="width: ${prozent}%"></div></div>
      <span>${prozent}%</span>
    </div>
  `;
}

function rendereFrage() {
  app.className = "container";
  const schritt = FRAGE_SCHRITTE[state.frageIndex];
  if (!schritt) { state.screen = "ergebnis"; rendere(); return; }

  let inhalt = "";
  if (schritt.typ === "regler") inhalt = rendereReglerFrage(REGLER[schritt.reglerIndex]);
  else if (schritt.typ === "taetigkeit") inhalt = rendereTaetigkeitsFrage(schritt.frageIndex, schritt.titel);
  else if (schritt.typ === "motivation") inhalt = rendereMotivationsFrage();

  const istLetzte = state.frageIndex === ANZAHL_FRAGEN - 1;
  const zurueck = state.frageIndex > 0
    ? `<button class="btn btn-leise" id="btn-zurueck">← Zurück</button>`
    : `<button class="btn btn-leise" id="btn-zurueck">← Zum Start</button>`;
  const weiterLabel = istLetzte ? "Ergebnis ansehen" : "Weiter";

  app.innerHTML = `
    ${rendereFortschritt()}
    <section class="karte">
      ${inhalt}
    </section>
    <div class="nav-unten">
      ${zurueck}
      <button class="btn btn-primary" id="btn-weiter" ${istSchrittFertig() ? "" : "disabled"}>${weiterLabel}</button>
    </div>
  `;

  document.getElementById("btn-zurueck").addEventListener("click", () => {
    if (state.frageIndex > 0) state.frageIndex--;
    else state.screen = "start";
    rendere();
  });
  document.getElementById("btn-weiter").addEventListener("click", () => {
    if (istLetzte) { state.screen = "ergebnis"; }
    else state.frageIndex++;
    rendere();
  });
  bindeFrageHandler(schritt);
}

function istSchrittFertig() {
  const schritt = FRAGE_SCHRITTE[state.frageIndex];
  if (schritt.typ === "regler") return true; // Defaultwert 50 zählt als Antwort
  if (schritt.typ === "taetigkeit") return true; // 0 Antworten erlaubt
  if (schritt.typ === "motivation") return true; // 0 Antworten erlaubt
  return false;
}

function rendereReglerFrage(regler) {
  const wert = state.antworten.regler[regler.id];
  return `
    <h2 class="frage-titel">${regler.frage}</h2>
    <div class="regler-block">
      <div class="regler-label">
        <span class="pol">${regler.linksPol}</span>
        <span class="pol">${regler.rechtsPol}</span>
      </div>
      <input type="range" min="0" max="100" step="25" value="${wert}" id="regler-input" aria-label="${regler.frage}">
      <div class="regler-ausgabe" id="regler-ausgabe">${reglerAusgabeText(regler, wert)}</div>
    </div>
  `;
}

function reglerAusgabeText(regler, wert) {
  if (wert <= 12) return `Klar ${regler.linksPol}`;
  if (wert <= 37) return `Eher ${regler.linksPol}`;
  if (wert <= 62) return "Mittendrin — egal";
  if (wert <= 87) return `Eher ${regler.rechtsPol}`;
  return `Klar ${regler.rechtsPol}`;
}

function rendereTaetigkeitsFrage(frageIndex, titel) {
  const tags = FRAGEN_TAGS[frageIndex];
  const items = tags.map(tag => {
    const text = TAG_TEXT[tag] || tag;
    const ist = state.antworten.taetigkeiten.has(tag);
    return `
      <label class="taetigkeit ${ist ? "gewaehlt" : ""}">
        <input type="checkbox" data-tag="${tag}" ${ist ? "checked" : ""}>
        <span>${text}</span>
      </label>
    `;
  }).join("");
  return `
    <h2 class="frage-titel">${titel}</h2>
    <p class="hilfe-text">Kreuze alle an, die du wirklich gerne machen würdest. Du kannst auch keine oder viele auswählen.</p>
    <div class="taetigkeiten">${items}</div>
  `;
}

function rendereMotivationsFrage() {
  const items = MOTIVATIONEN.map(m => {
    const ist = state.antworten.motivation.has(m.id);
    return `
      <label class="option ${ist ? "gewaehlt" : ""}">
        <input type="checkbox" data-motivation="${m.id}" ${ist ? "checked" : ""}>
        <span class="option-text">${m.label}</span>
      </label>
    `;
  }).join("");
  return `
    <h2 class="frage-titel">Was wäre dir in deinem Beruf am wichtigsten?</h2>
    <p class="motivations-hinweis">Wähle bis zu 3 Antworten aus.</p>
    <div class="optionen">${items}</div>
  `;
}

function bindeFrageHandler(schritt) {
  if (schritt.typ === "regler") {
    const input = document.getElementById("regler-input");
    const out = document.getElementById("regler-ausgabe");
    const regler = REGLER[schritt.reglerIndex];
    input.addEventListener("input", () => {
      const wert = parseInt(input.value, 10);
      state.antworten.regler[regler.id] = wert;
      out.textContent = reglerAusgabeText(regler, wert);
      speichereState(state);
    });
  } else if (schritt.typ === "taetigkeit") {
    app.querySelectorAll('.taetigkeit input[type="checkbox"]').forEach(inp => {
      inp.addEventListener("change", e => {
        const tag = e.target.dataset.tag;
        if (e.target.checked) state.antworten.taetigkeiten.add(tag);
        else state.antworten.taetigkeiten.delete(tag);
        e.target.closest(".taetigkeit").classList.toggle("gewaehlt", e.target.checked);
        speichereState(state);
      });
    });
  } else if (schritt.typ === "motivation") {
    const inputs = app.querySelectorAll('input[data-motivation]');
    inputs.forEach(inp => {
      inp.addEventListener("change", e => {
        const id = e.target.dataset.motivation;
        if (e.target.checked) {
          if (state.antworten.motivation.size >= 3) {
            e.target.checked = false;
            return;
          }
          state.antworten.motivation.add(id);
        } else {
          state.antworten.motivation.delete(id);
        }
        e.target.closest(".option").classList.toggle("gewaehlt", e.target.checked);
        speichereState(state);
      });
    });
  }
}

/* ======================================================================
   MATCHING-ALGORITHMUS
   ====================================================================== */

function matche() {
  const a = state.antworten;
  const userTags = a.taetigkeiten;
  const userRegler = a.regler;
  const userMotivation = a.motivation;

  // Berufe ohne needs_review filtern
  const kandidaten = BERUFE.filter(b => !b.needs_review);

  const bewertet = kandidaten.map(b => {
    // 1) Tag-Score
    const berufTags = b.tags || [];
    let matchTags = [];
    for (const t of berufTags) if (userTags.has(t)) matchTags.push(t);
    const tagScore = berufTags.length > 0 ? matchTags.length / berufTags.length : 0;

    // 2) Umgebungs-Score
    let umgDiff = 0;
    for (const r of REGLER) {
      const userVal = userRegler[r.id];
      const berufVal = (b.umgebung && b.umgebung[r.id] != null) ? b.umgebung[r.id] : 50;
      umgDiff += Math.abs(userVal - berufVal);
    }
    const umgebungScore = 1 - (umgDiff / (REGLER.length * 100));

    // 3) Motivations-Score
    const berufKat = new Set(b.kategorien || []);
    let motOverlap = 0;
    let motTotalKat = berufKat.size;
    if (userMotivation.size > 0 && motTotalKat > 0) {
      for (const kat of berufKat) {
        for (const m of userMotivation) {
          if ((MOTIVATION_MAPPING[m] || []).includes(kat)) { motOverlap++; break; }
        }
      }
    }
    const motivationScore = motTotalKat > 0 ? motOverlap / motTotalKat : 0;

    const gesamt = W_TAGS * tagScore + W_UMGEBUNG * umgebungScore + W_MOTIVATION * motivationScore;

    return { beruf: b, score: gesamt, matchTags, tagScore, umgebungScore };
  });

  bewertet.sort((x, y) => y.score - x.score);

  // Mindest-Schwelle: 2+ passende Tags ODER Score >= SCHWELLE_RELEVANT.
  const relevante = bewertet.filter(b => b.matchTags.length >= 2 || b.score >= SCHWELLE_RELEVANT);

  // Diversifizieren:
  // - max. 2 pro Oberkategorie (erste Kategorie)
  // - skip wenn Tag-Signatur zu sehr mit schon gewaehltem Beruf ueberlappt (>=60%)
  const top = [];
  const katZaehler = {};
  const MAX_PRO_KAT = 2;
  const MAX_TAG_OVERLAP = 0.6;

  function tagOverlap(a, b) {
    const sa = new Set(a || []);
    const sb = new Set(b || []);
    if (sa.size === 0 || sb.size === 0) return 0;
    let gem = 0;
    for (const t of sa) if (sb.has(t)) gem++;
    return gem / Math.min(sa.size, sb.size);
  }

  for (const b of relevante) {
    if (top.length >= 10) break;
    const kategorien = b.beruf.kategorien || [];
    const hauptKat = kategorien[0] || "_unbekannt";
    if ((katZaehler[hauptKat] || 0) >= MAX_PRO_KAT) continue;
    let duplikat = false;
    for (const bestehend of top) {
      if (tagOverlap(b.beruf.tags, bestehend.beruf.tags) >= MAX_TAG_OVERLAP) {
        duplikat = true;
        break;
      }
    }
    if (duplikat) continue;
    top.push(b);
    katZaehler[hauptKat] = (katZaehler[hauptKat] || 0) + 1;
  }

  return top;
}

function begruendung(match) {
  const { beruf, matchTags, tagScore, umgebungScore } = match;
  const regler = state.antworten.regler;

  const parts = [];
  if (matchTags.length > 0) {
    const texte = matchTags.slice(0, 3).map(t => TAG_TEXT[t] || t);
    parts.push(`Dieser Beruf passt, weil du bei „${texte.join("“, „")}“ angekreuzt hast.`);
  } else {
    parts.push("Dieser Beruf passt zu deinem Profil bei den Umgebungs- und Motivationsfragen.");
  }

  // Umgebungs-Zusatz
  const u = beruf.umgebung || {};
  const umgTeile = [];
  if (Math.abs(regler.drinnen_draussen - (u.drinnen_draussen || 50)) < 25) {
    umgTeile.push(regler.drinnen_draussen < 50 ? "drinnen" : (regler.drinnen_draussen > 50 ? "draußen" : null));
  }
  if (Math.abs(regler.anpacken_konzentriert - (u.anpacken_konzentriert || 50)) < 25) {
    umgTeile.push(regler.anpacken_konzentriert < 50 ? "körperlich anpackend" : (regler.anpacken_konzentriert > 50 ? "still konzentriert" : null));
  }
  const gefilt = umgTeile.filter(Boolean);
  if (gefilt.length) parts.push(`Typische Umgebung: ${gefilt.join(", ")}.`);

  return parts.join(" ");
}

/* ======================================================================
   ERGEBNIS-ANZEIGE

function rendereErgebnis() {
  app.className = "container-breit";

  if (!BERUFE || BERUFE.length === 0) {
    app.innerHTML = `
      <section class="karte fehler">
        <h2>Noch keine Berufsdaten verfügbar</h2>
        <p>Die Berufsliste ist noch nicht eingebettet. Bitte lass die Datei <code>build/berufe.json</code> generieren und in diese HTML-Datei einbetten (Phase 6).</p>
        <button class="btn btn-sekundaer" onclick="window.location.reload()">Neu starten</button>
      </section>
    `;
    return;
  }

  const top = matche();
  const anzahl = top.length;

  // Sonderfall: Schueler:in hat weder Taetigkeiten noch Motivationen angekreuzt.
  // Dann ist jeder Match Zufall – wir bitten ehrlich darum, zurueckzugehen.
  const nichtsAngekreuzt = state.antworten.taetigkeiten.size === 0 && state.antworten.motivation.size === 0;
  if (nichtsAngekreuzt) {
    app.innerHTML = `
      <section class="karte">
        <h2>Wir brauchen ein paar Antworten von dir</h2>
        <p>Du hast keine Tätigkeiten und keine Motivationen angekreuzt — dann können wir nichts vorschlagen, ohne zu raten.</p>
        <p>Geh zurück und kreuze in den Fragen an, was dich anspricht. Es gibt keine richtigen oder falschen Antworten.</p>
        <div class="ergebnis-aktionen">
          <button class="btn btn-primary" id="btn-zurueck-fragen">Zurück zu den Fragen</button>
          <button class="btn btn-sekundaer" id="btn-neu">Fragebogen neu starten</button>
        </div>
      </section>
    `;
    document.getElementById("btn-zurueck-fragen").addEventListener("click", () => {
      state.screen = "frage";
      state.frageIndex = Math.max(0, FRAGE_SCHRITTE.findIndex(s => s.typ === "taetigkeit"));
      rendere();
    });
    document.getElementById("btn-neu").addEventListener("click", () => {
      state = leererState();
      rendere();
    });
    return;
  }

  const rohIndex = new Map((BERUFE_ROH || []).map(r => [r.id, r]));
  const karten = top.map((m, i) => {
    const b = m.beruf;
    const roh = rohIndex.get(b.id);
    const beschreibung = roh ? roh.beschreibung : "";
    const dauer = b.dauer_jahre ? `${b.dauer_jahre} Jahre` : "";
    const seltenBadge = b.seltenheit === "selten"
      ? `<span class="badge-selten" title="Nur an wenigen Standorten in Deutschland ausbildbar">selten</span>`
      : "";
    // Prozent absolut: SCHWELLE_STARK (= "starke Passung") entspricht 100 %.
    const prozent = Math.min(100, Math.round((m.score / SCHWELLE_STARK) * 100));
    const stufe = PASSUNGS_STUFEN.find(s => m.score >= s.min);
    const topKlasse = i < 3 ? "top" : "";
    return `
      <article class="ergebnis-karte ${topKlasse}">
        <div class="rang">Vorschlag ${i + 1}</div>
        <h3>${escapeHtml(b.name)}${seltenBadge}</h3>
        <div class="match-zeile" title="${stufe.text}">
          <div class="match-balken"><div class="match-fuellung ${stufe.klasse}" style="width: ${prozent}%"></div></div>
          <div class="match-prozent">${prozent}%</div>
        </div>
        ${beschreibung ? `<p class="beschreibung">${escapeHtml(beschreibung)}</p>` : ""}
        <div class="begruendung">${escapeHtml(begruendung(m))}</div>
        ${dauer ? `<div class="meta">Ausbildungsdauer: ${dauer}</div>` : ""}
        <a class="link-mehr" href="https://www.google.com/search?q=${encodeURIComponent(b.name + " berufenet")}" target="_blank" rel="noopener">
          Mehr erfahren auf BERUFENET →
        </a>
      </article>
    `;
  }).join("");

  app.innerHTML = `
    <section class="ergebnis-kopf">
      <h1>Deine ${anzahl} Vorschl${anzahl === 1 ? "ag" : "äge"}</h1>
      <p>${anzahl >= 5
          ? "Das ist ein Spektrum — nicht DIE eine richtige Wahl. Schau, was dich anspricht und recherchiere weiter."
          : "Zu deinem Profil haben wir nur wenige klar passende Berufe gefunden. Nimm dir Zeit, sie genauer anzuschauen — oder geh zurück und kreuze mehr Tätigkeiten an."}</p>
    </section>
    <section class="ergebnis-gitter">${karten}</section>
    ${top.some(m => m.beruf.seltenheit === "selten") ? `
    <div class="grosser-hinweis">
      <strong>Hinweis zu seltenen Berufen:</strong> Mit „selten" markierte Berufe werden nur an wenigen Orten in Deutschland ausgebildet. Ob du dort einen Ausbildungsplatz findest, klärst du am besten im <em>Großen Pfadfinder</em> oder direkt bei der Arbeitsagentur.
    </div>` : ""}
    <div class="ergebnis-aktionen">
      <button class="btn btn-primary" id="btn-drucken">Ergebnis drucken</button>
      <button class="btn btn-sekundaer" id="btn-neu">Fragebogen neu starten</button>
    </div>
  `;

  document.getElementById("btn-drucken").addEventListener("click", () => window.print());
  document.getElementById("btn-neu").addEventListener("click", () => {
    state = leererState();
    rendere();
  });
}

/* ======================================================================
   UTILITIES
   ====================================================================== */

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

/* ======================================================================
   START
   ====================================================================== */

rendere();
</script>
</body>
